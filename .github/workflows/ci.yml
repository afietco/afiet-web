# Sürekli doğrulama: development/staging/main'e giden PR'larda ve bu dallara
# push'larda typecheck + build + smoke (headless Chrome) çalışır.
# Production deploy'u Vercel yapar (main = production) — burada build alınmaz.
name: ci

on:
  pull_request:
    branches: [development, staging, main]
  push:
    branches: [development, staging, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Lockfile npm 11 ile yazılıyor; Node 22'nin npm 10'u opsiyonel
      # bağımlılıkları farklı doğrulayıp senkron hatası veriyor (npm/cli#4828).
      - run: npm install -g npm@11

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - name: Smoke testi (headless Chrome)
        run: npm run smoke
        env:
          CHROME_PATH: /usr/bin/google-chrome
